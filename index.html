<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Our Story ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="progress-container">
    <div class="progress-bar" id="progress"></div>
</div>

<!-- PAGE 0 -->

<div class="slide active">

    <div class="cover-title">
        A look back at
    </div>

    <div class="cover-main">
        the story of
    </div>

    <div class="cover-love">
        UM ❤️
    </div>

    <div class="cover-subtitle">
        22 September 2024 → Today
    </div>

</div>

<!-- PAGE 1 -->

<div class="slide">

    <div class="counter-label">
        It has been
    </div>

    <div class="counter-grid">

        <div class="counter-stack">

        <div class="counter-row">
            <span class="counter-value" id="years">0</span>
            <span class="counter-label"> Years</span>
        </div>

        <div class="counter-row">
            <span class="counter-value" id="months">0</span>
            <span class="counter-label"> Months</span>
        </div>

        <div class="counter-row">
            <span class="counter-value" id="days">0</span>
            <span class="counter-label"> Days</span>
        </div>

        <div class="counter-row">
            <span class="counter-value" id="hours">0</span>
            <span class="counter-label"> Hours</span>
        </div>

        <div class="counter-row">
            <span class="counter-value" id="minutes">0</span>
            <span class="counter-label"> Minutes</span>
        </div>

</div>

    </div>

    <div class="counter-footer">
        since our story began ❤️
    </div>

</div>

<!-- PAGE 2 -->

<div class="slide">

    <div class="date">
        22 September 2024
    </div>

    <div class="page-heading">
        It all started with...
    </div>

    <div class="chat-card">

        <div class="sender">
            Ulric
        </div>

        <div class="chat-bubble">
            hey
        </div>

    </div>

    <div class="page-footer">
        and since then...
    </div>

</div>

<!-- NAVIGATION -->

<div class="nav-btn left" onclick="prevSlide()">
    &#10094;
</div>

<div class="nav-btn right" onclick="nextSlide()">
    &#10095;
</div>

<script src="script.js"></script>

</body>
</html>
